name: build

# 英雄傳奇II 繁中化:打包翻譯資產 + 跨平台 ScummVM(AGS + CJK patch)。
# 注意:macOS / Android job 依 ScummVM 官方 build 流程撰寫,首次執行可能需依
# runner 環境微調(NDK 版本、brew 套件名)。translate-assets job 為平台無關、
# 一定可產出的核心交付物。

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  # ---- 平台無關的繁中化資產(核心交付物)----
  translate-assets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: 安裝 CJK 字型(host 來源)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: 產生 chinese.tra + cjkfont16.bin
        run: |
          uv venv && uv pip install pillow
          uv run tools/make_tra.py tools/translation.tsv --out dist/chinese.tra --charset-out build/charset.txt
          uv run tools/build_cjk_font.py --size 16 --charset-file build/charset.txt --bin dist/cjkfont16.bin --out build/cjk16
          uv run tools/build_cjk_font.py --size 24 --charset-file build/charset.txt --bin dist/cjkfont24.bin --out build/cjk24
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-assets
          path: |
            dist/chinese.tra
            dist/cjkfont16.bin
            dist/cjkfont24.bin
            README.md

  # ---- macOS universal .app/.dmg(patched ScummVM,僅 ags engine)----
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: 安裝相依(libmad 另從源碼自編,brew 的 mad 只有 dylib、缺靜態 .a)
        run: brew install sdl2 sdl2_net freetype libpng libvorbis libogg flac bzip2 zlib dylibbundler autoconf
      - name: 把 keg-only 的 bzip2/zlib 靜態檔 symlink 到 configure 硬編的路徑
        run: |
          # ScummVM configure 在 link 行硬編 /opt/homebrew/lib/libbz2.a 與 libz.a,
          # 但 brew bzip2/zlib 是 keg-only,.a 在 /opt/homebrew/opt/*/lib。建 symlink。
          ln -sf /opt/homebrew/opt/bzip2/lib/libbz2.a /opt/homebrew/lib/libbz2.a
          ln -sf /opt/homebrew/opt/zlib/lib/libz.a    /opt/homebrew/lib/libz.a
      - name: 自編 libmad 靜態庫(AGS engine 必要依賴;brew mad 只有 dylib,ScummVM 靜態 link 需 libmad.a)
        run: |
          # ScummVM 的 scummvm-static target 在 link 行硬編 /opt/homebrew/lib/libmad.a,
          # 但 brew mad 不附 .a。照源碼自編裝進 /opt/homebrew(libmad.a + mad.h 各就各位)。
          # libmad 0.15.1b(2004)三個雷:
          # (a) configure 對「gcc」塞一堆 gcc 專屬最佳化 flag,但 macOS 的 gcc 是 clang,
          #     -fforce-mem/-fforce-addr/-fthread-jumps/-fcse-*/-fregmove/-fexpensive-optimizations/
          #     -fschedule-insns2 等全部 unknown argument → 編譯中止。一次 strip 光。
          # (b) 隨附 config.sub/guess(2004)不認 aarch64-apple-darwin → 換 GNU 新版。
          curl -fsSL -o /tmp/libmad.tar.gz \
            https://deb.debian.org/debian/pool/main/libm/libmad/libmad_0.15.1b.orig.tar.gz
          cd /tmp && tar xf libmad.tar.gz && cd libmad-0.15.1b
          sed -i '' -E 's/-f(force-mem|force-addr|inline-functions|thread-jumps|cse-follow-jumps|cse-skip-blocks|rerun-cse-after-loop|rerun-loop-opt|gcse|expensive-optimizations|regmove|schedule-insns2|schedule-insns|strength-reduce)//g' configure
          curl -fsSL -o config.sub   'https://git.savannah.gnu.org/cgit/config.git/plain/config.sub'
          curl -fsSL -o config.guess 'https://git.savannah.gnu.org/cgit/config.git/plain/config.guess'
          chmod +x config.sub config.guess
          ./configure --prefix=/opt/homebrew --enable-static --disable-shared
          make -j"$(sysctl -n hw.ncpu)"
          make install
          ls -l /opt/homebrew/lib/libmad.a /opt/homebrew/include/mad.h
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: configure + build + bundle
        working-directory: scummvm-src
        run: |
          # [關鍵] 不可 --disable-mad:mad(MP3)是 AGS engine 必要依賴,缺了 configure 會印
          # "Disabling engine AGS because dependencies unmet: MAD" 卻仍退出 0,只編 detection,
          # 跑遊戲報 "Could not find suitable engine plugin"。
          ./configure --disable-all-engines --enable-engine=ags --enable-release \
            --disable-faad --disable-a52 --disable-fluidsynth \
            --disable-libcurl --disable-sndio --disable-tts \
            2>&1 | tee /tmp/cfg.log
          # [守門] AGS engine 沒被 mad 依賴剔除,否則中止(避免又默默產出跑不了的 app)
          if grep -qiE "Disabling engine Adventure Game Studio" /tmp/cfg.log; then
            echo "### AGS ENGINE 被剔除(libmad 依賴未滿足)— 中止 ###"
            grep -iE "Disabling engine Adventure|Checking for MAD" /tmp/cfg.log; exit 13
          fi
          make -j$(sysctl -n hw.ncpu)
          # [守門] 確認 ags engine 本體真的編入(不只 detection.o)
          AGS_OBJ=$(find engines/ags -name "*.o" ! -name "detection.o" | wc -l | tr -d " ")
          echo "ags engine 本體 .o 數 = $AGS_OBJ (0=只有 detection,引擎沒編入)"
          [ "$AGS_OBJ" -gt 0 ] || { echo "### AGS engine 本體未編入 — 中止 ###"; exit 14; }
          make bundle
      - name: 把相依 dylib 打包進 .app(否則乾淨 Mac 缺 brew 庫會 dyld 閃退)
        working-directory: scummvm-src
        run: |
          APP=$(ls -d ScummVM.app */ScummVM.app 2>/dev/null | head -1)
          echo "bundling dylibs into $APP"
          # dylibbundler 遞迴把非系統 dylib(brew 的 SDL2/freetype…)拷進 .app/Contents/libs 並改 install_name
          dylibbundler -od -b -cd \
            -x "$APP/Contents/MacOS/scummvm" \
            -d "$APP/Contents/libs" \
            -p "@executable_path/../libs/"
          echo "=== 確認主執行檔已無外部 /opt/homebrew 依賴 ==="
          otool -L "$APP/Contents/MacOS/scummvm" | grep -E "homebrew|/usr/local" && echo "!! 仍有外部依賴" || echo "OK:只剩系統庫與 @executable_path"
      - name: 打包 DMG
        run: |
          mkdir -p dmgroot && cp -R scummvm-src/ScummVM.app dmgroot/ 2>/dev/null || cp -R scummvm-src/*.app dmgroot/
          hdiutil create -volname "QFG2-CHT-ScummVM" -srcfolder dmgroot -ov -format UDZO qfg2-cht-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-macos
          path: qfg2-cht-macos.dmg

  # ---- Android APK(patched ScummVM,僅 ags engine)----
  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: 安裝相依
        run: sudo apt-get update && sudo apt-get install -y build-essential nasm
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: 安裝 Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with: { ndk-version: r26d }
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: 從源碼建 Oboe(ScummVM Android 音訊庫)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          git clone --depth 1 https://github.com/google/oboe.git "$GITHUB_WORKSPACE/oboe"
          # [HARD] BUILD_SHARED_LIBS=ON:ScummVM 用 -Wl,-Bdynamic -loboe 動態連結,
          # 需 liboboe.so;預設 cmake 產 liboboe.a(靜態)會 undefined symbol。
          cmake -S "$GITHUB_WORKSPACE/oboe" -B "$GITHUB_WORKSPACE/oboe-build" \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
          cmake --build "$GITHUB_WORKSPACE/oboe-build" -j$(nproc)
          # 放進 NDK sysroot lib:NDK 連結 API21 會找 aarch64-linux-android/(通用)與 /21/ 兩處,都放。
          SYSLIB="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android"
          LOBOE=$(find "$GITHUB_WORKSPACE/oboe-build" -name 'liboboe.so' | head -1)
          echo ">> liboboe.so 位置: $LOBOE"
          cp "$LOBOE" "$SYSLIB/"
          cp "$LOBOE" "$SYSLIB/21/" 2>/dev/null || true
          ls -la "$SYSLIB/liboboe.so" "$SYSLIB/21/liboboe.so" 2>/dev/null || true
      - name: 自編 libmad for Android(arm64-v8a;AGS engine 必要依賴,缺則引擎只剩 detection)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          # AGS engine 硬依賴 libmad(MP3)。NDK 環境沒有 → configure 印 Disabling AGS、退出 0、
          # 只編 detection → APK 跑遊戲報「Could not find suitable engine plugin」(同 Win/macOS 根因)。
          # 用 NDK clang 把 libmad cross-build 進 NDK sysroot(同 oboe 模式),configure 才偵測得到。
          # 本地 docker + NDK r26d 已實證:libmad.a 產出 + #include<mad.h> -lmad 連結成 aarch64 ELF。
          TC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"
          export CC=aarch64-linux-android21-clang CXX=aarch64-linux-android21-clang++ AR=llvm-ar RANLIB=llvm-ranlib
          curl -fsSL -o /tmp/libmad.tar.gz https://deb.debian.org/debian/pool/main/libm/libmad/libmad_0.15.1b.orig.tar.gz
          cd /tmp && tar xf libmad.tar.gz && cd libmad-0.15.1b
          # libmad 0.15.1b 老雷:gcc 專屬最佳化 flag(NDK clang 全不認)strip 光;config.sub 換新版認 android triple;
          # CXX 必設(libtool 會探測 C++ 編譯器,只設 CC 會退回 host /lib/cpp 而 sanity 失敗)。
          sed -i -E 's/-f(force-mem|force-addr|inline-functions|thread-jumps|cse-follow-jumps|cse-skip-blocks|rerun-cse-after-loop|rerun-loop-opt|gcse|expensive-optimizations|regmove|schedule-insns2|schedule-insns|strength-reduce)//g' configure
          curl -fsSL -o config.sub   'https://git.savannah.gnu.org/cgit/config.git/plain/config.sub'
          curl -fsSL -o config.guess 'https://git.savannah.gnu.org/cgit/config.git/plain/config.guess'
          ./configure --host=aarch64-linux-android --enable-static --disable-shared --enable-fpm=64bit --prefix=/tmp/madinst
          make -j$(nproc) && make install
          cp /tmp/madinst/include/mad.h "$TC/sysroot/usr/include/"
          cp /tmp/madinst/lib/libmad.a "$TC/sysroot/usr/lib/aarch64-linux-android/"
          ls -l "$TC/sysroot/usr/lib/aarch64-linux-android/libmad.a"
      - name: 自編 libmpeg2 for Android(arm64-v8a;AGS 片頭 MPEG-1 影片 CPU 軟解)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          # AGS 用 Video::MPEGPSDecoder 播 .001 片頭(MPEG-1 system stream),影片解碼 #ifdef USE_MPEG2
          # (libmpeg2,純 CPU 軟解)。NDK 沒有 → ScummVM feature 無 MPEG2、片頭報 Unable to decode video
          # (Linux/Windows build 有 MPEG2 所以動畫能播)。比照 libmad cross-build 進 NDK sysroot。
          # 本地 docker + NDK r26d 已實證 arm64/x86_64 兩 ABI 的 libmpeg2.a 產出。
          # ScummVM configure 偵測碼(inttypes + extern C + MPEG2_RELEASE>=0.4.0)cross 時只 compile+link。
          TC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"
          export CC=aarch64-linux-android21-clang CXX=aarch64-linux-android21-clang++ AR=llvm-ar RANLIB=llvm-ranlib
          curl -fsSL -o /tmp/mpeg2.tar.gz https://deb.debian.org/debian/pool/main/m/mpeg2dec/mpeg2dec_0.5.1.orig.tar.gz
          cd /tmp && tar xf mpeg2.tar.gz && cd libmpeg2-0.5.1
          # 老 config.sub/guess(不認 android triple)換 GNU 新版
          find . \( -name config.sub -o -name config.guess \) | while read f; do curl -fsSL -o "$f" "https://git.savannah.gnu.org/cgit/config.git/plain/$(basename "$f")"; chmod +x "$f"; done
          ./configure --host=aarch64-linux-android --enable-static --disable-shared --disable-sdl --without-x --prefix=/tmp/m2inst
          make -j$(nproc) && make install
          mkdir -p "$TC/sysroot/usr/include/mpeg2dec"
          cp /tmp/m2inst/include/mpeg2dec/*.h "$TC/sysroot/usr/include/mpeg2dec/"
          cp /tmp/m2inst/lib/libmpeg2.a "$TC/sysroot/usr/lib/aarch64-linux-android/"
          ls -l "$TC/sysroot/usr/lib/aarch64-linux-android/libmpeg2.a"
      - name: configure + build APK (arm64)
        working-directory: scummvm-src
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          # ScummVM Android toolchain build(僅 ags engine)。
          # [HARD] ANDROID_NDK_ROOT 必須指向我們 setup 的 NDK:configure(2208 行)用
          # $ANDROID_NDK_ROOT/source.properties 抓 NDK 版本,沒設會抓到 runner 預裝的
          # 別版(27.3)→ 與 build.gradle ndkVersion 不符 → make androiddist exit 1。
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          # 把 dists/android/build.gradle 的 ndkVersion 改成實際 NDK 版本,讓 configure 比對通過
          NDKVER=$(sed -n 's/^Pkg.Revision *= *//p' "$ANDROID_NDK_ROOT/source.properties")
          echo ">> NDK 版本: $NDKVER"
          sed -i "s/ndkVersion *= *\"[^\"]*\"/ndkVersion = \"$NDKVER\"/" dists/android/build.gradle
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          export CPPFLAGS="-I$GITHUB_WORKSPACE/oboe/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/oboe-build"
          # [HARD] --host 必須是 android-arm64-v8a(ScummVM configure 認的 pattern);
          # 用 android-aarch64 不 match 任何 case → 不進 Android 分支 → 不套 -loboe -llog → undefined
          # [HARD] 參數順序:--disable-all-engines 必須在 --enable-engine=ags **之前**。
          # configure 逐一處理、後者覆蓋:若 enable 在前、disable-all 在後,會把 ags 一起關掉
          # → log 出現「Engines Skipped: Adventure Game Studio」、只編 detection.o(引擎沒進 APK)。
          ./configure --host=android-arm64-v8a --disable-all-engines --enable-engine=ags --enable-release
          # [HARD] liboboe.so 必須在 make -j$(nproc) 之前放進 android_project/lib/arm64-v8a/。
          # (同 android-x86 job 的修正:make 'all' target 本身已包含 gradlew assembleDebug,
          #  APK 在第一個 make 就封裝完畢;make 後才 cp liboboe.so 是 too late。)
          LOBOE=$(find "$GITHUB_WORKSPACE/oboe-build" -name 'liboboe.so' | head -1)
          mkdir -p android_project/lib/arm64-v8a
          cp "$LOBOE" android_project/lib/arm64-v8a/liboboe.so
          echo ">> liboboe.so 預置 android_project/lib/arm64-v8a/ ($(wc -c <"$LOBOE") bytes)"
          make -j$(nproc)
          # [守門] 確認 ags engine 本體真的編入(libmad 生效),不只 detection.o
          AGS_OBJ=$(find engines/ags -name "*.o" ! -name "detection.o" | wc -l)
          echo ">> ags engine 本體 .o 數 = $AGS_OBJ (0=只有 detection,libmad 沒生效)"
          [ "$AGS_OBJ" -gt 0 ] || { echo "### AGS engine 未編入 — 中止 ###"; exit 14; }
          # [HARD] androidtest 會跑 installDebug(裝到裝置),CI 無裝置/模擬器會 fail。
          # androiddistdebug = all(gradlew assembleDebug 純 build APK)+ cp 到 debug/,不安裝。
          make androiddistdebug
          echo ">> APK 內含 .so:"
          unzip -l ScummVM-debug.apk | grep '\.so' || true
          ls -la *.apk debug/*.apk 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-android
          path: scummvm-src/**/*.apk

  # ---- Android APK(x86_64 debug,供 android-dpad-test 模擬器使用)----
  # 原 android job 只 build arm64-v8a(給真手機);arm64 APK 裝到 x86_64 模擬器一跑就 crash。
  # 本 job 另 build x86_64 debug APK,ABI 對上 GitHub Actions 的 x86_64 模擬器。
  # 規則:不破壞原 android job 的 arm64 產物;本 job 純為 CI 驗證用途。
  android-x86:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: 安裝相依
        run: sudo apt-get update && sudo apt-get install -y build-essential nasm
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: 安裝 Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with: { ndk-version: r26d }
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: 從源碼建 Oboe(x86_64)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          git clone --depth 1 https://github.com/google/oboe.git "$GITHUB_WORKSPACE/oboe"
          # [HARD] BUILD_SHARED_LIBS=ON:ScummVM 用 -Wl,-Bdynamic -loboe 動態連結,同 arm64 job。
          cmake -S "$GITHUB_WORKSPACE/oboe" -B "$GITHUB_WORKSPACE/oboe-build" \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=x86_64 -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
          cmake --build "$GITHUB_WORKSPACE/oboe-build" -j$(nproc)
          # x86_64 sysroot 放 x86_64-linux-android/(同 arm64 job 的 aarch64-linux-android/)
          SYSLIB="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android"
          LOBOE=$(find "$GITHUB_WORKSPACE/oboe-build" -name 'liboboe.so' | head -1)
          echo ">> liboboe.so 位置: $LOBOE"
          cp "$LOBOE" "$SYSLIB/"
          cp "$LOBOE" "$SYSLIB/21/" 2>/dev/null || true
          ls -la "$SYSLIB/liboboe.so" "$SYSLIB/21/liboboe.so" 2>/dev/null || true
      - name: 自編 libmad for Android(x86_64;AGS engine 必要依賴,缺則引擎只剩 detection)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          # 同 arm64 job:AGS engine 硬依賴 libmad,NDK 沒有 → 引擎只剩 detection、跑遊戲報
          # Could not find suitable engine plugin。用 NDK clang cross-build 進 sysroot。
          # 本地 docker + NDK r26d 已實證:x86_64 libmad.a + -lmad 連結成 x86-64 ELF。
          TC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"
          export CC=x86_64-linux-android21-clang CXX=x86_64-linux-android21-clang++ AR=llvm-ar RANLIB=llvm-ranlib
          curl -fsSL -o /tmp/libmad.tar.gz https://deb.debian.org/debian/pool/main/libm/libmad/libmad_0.15.1b.orig.tar.gz
          cd /tmp && tar xf libmad.tar.gz && cd libmad-0.15.1b
          sed -i -E 's/-f(force-mem|force-addr|inline-functions|thread-jumps|cse-follow-jumps|cse-skip-blocks|rerun-cse-after-loop|rerun-loop-opt|gcse|expensive-optimizations|regmove|schedule-insns2|schedule-insns|strength-reduce)//g' configure
          curl -fsSL -o config.sub   'https://git.savannah.gnu.org/cgit/config.git/plain/config.sub'
          curl -fsSL -o config.guess 'https://git.savannah.gnu.org/cgit/config.git/plain/config.guess'
          ./configure --host=x86_64-linux-android --enable-static --disable-shared --enable-fpm=64bit --prefix=/tmp/madinst
          make -j$(nproc) && make install
          cp /tmp/madinst/include/mad.h "$TC/sysroot/usr/include/"
          cp /tmp/madinst/lib/libmad.a "$TC/sysroot/usr/lib/x86_64-linux-android/"
          ls -l "$TC/sysroot/usr/lib/x86_64-linux-android/libmad.a"
      - name: 自編 libmpeg2 for Android(x86_64;AGS 片頭 MPEG-1 影片 CPU 軟解)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          # 同 arm64:AGS 片頭 .001 是 MPEG-1,需 libmpeg2(USE_MPEG2,CPU 軟解)。NDK 沒有就不播。
          TC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TC/bin:$PATH"
          export CC=x86_64-linux-android21-clang CXX=x86_64-linux-android21-clang++ AR=llvm-ar RANLIB=llvm-ranlib
          curl -fsSL -o /tmp/mpeg2.tar.gz https://deb.debian.org/debian/pool/main/m/mpeg2dec/mpeg2dec_0.5.1.orig.tar.gz
          cd /tmp && tar xf mpeg2.tar.gz && cd libmpeg2-0.5.1
          find . \( -name config.sub -o -name config.guess \) | while read f; do curl -fsSL -o "$f" "https://git.savannah.gnu.org/cgit/config.git/plain/$(basename "$f")"; chmod +x "$f"; done
          ./configure --host=x86_64-linux-android --enable-static --disable-shared --disable-sdl --without-x --prefix=/tmp/m2inst
          make -j$(nproc) && make install
          mkdir -p "$TC/sysroot/usr/include/mpeg2dec"
          cp /tmp/m2inst/include/mpeg2dec/*.h "$TC/sysroot/usr/include/mpeg2dec/"
          cp /tmp/m2inst/lib/libmpeg2.a "$TC/sysroot/usr/lib/x86_64-linux-android/"
          ls -l "$TC/sysroot/usr/lib/x86_64-linux-android/libmpeg2.a"
      - name: configure + build APK (x86_64 debug)
        working-directory: scummvm-src
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          NDKVER=$(sed -n 's/^Pkg.Revision *= *//p' "$ANDROID_NDK_ROOT/source.properties")
          echo ">> NDK 版本: $NDKVER"
          sed -i "s/ndkVersion *= *\"[^\"]*\"/ndkVersion = \"$NDKVER\"/" dists/android/build.gradle
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          # [HARD] x86_64 toolchain:CC/CXX 換成 x86_64-linux-android21-clang*
          export CC=x86_64-linux-android21-clang
          export CXX=x86_64-linux-android21-clang++
          export CPPFLAGS="-I$GITHUB_WORKSPACE/oboe/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/oboe-build"
          # [HARD] --host=android-x86_64:ScummVM configure 認的 x86_64 pattern(見 configure:1785)
          # [HARD] 同 arm64:--disable-all-engines 必須在 --enable-engine=ags 之前,否則 ags 被一起關掉
          ./configure --host=android-x86_64 --disable-all-engines --enable-engine=ags --enable-release
          # [HARD] liboboe.so 必須在 make -j$(nproc) 之前放進 android_project/lib/x86_64/。
          # 原因:ScummVM 的 make 'all' target(= make -j$(nproc) 預設)已包含
          # (cd ./android_project; ./gradlew assembleDebug)。APK 在第一個 make 就封裝完畢。
          # 若在 make 之後才 cp liboboe.so,APK 早已建好,make androiddistdebug 是 no-op。
          # 解法:configure 完成後、make 執行前先預置 liboboe.so。
          LOBOE=$(find "$GITHUB_WORKSPACE/oboe-build" -name 'liboboe.so' | head -1)
          mkdir -p android_project/lib/x86_64
          cp "$LOBOE" android_project/lib/x86_64/liboboe.so
          # [HARD] oboe 是 c++_shared,liboboe.so 動態連 libc++_shared.so。APK 缺它 →
          # liboboe 載入失敗 → ScummVM 一啟動就 crash(keeps stopping)。這正是 inject_android.sh
          # 當初補過的「liboboe needs libc++_shared」。從 NDK sysroot 補 x86_64 版進 jniLibs。
          LIBCPP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android/libc++_shared.so"
          cp "$LIBCPP" android_project/lib/x86_64/libc++_shared.so
          echo ">> 預置 liboboe.so ($(wc -c <"$LOBOE")) + libc++_shared.so ($(wc -c <"$LIBCPP")) 到 lib/x86_64/"
          make -j$(nproc)
          # [守門] 確認 ags engine 本體真的編入(libmad 生效),不只 detection.o
          AGS_OBJ=$(find engines/ags -name "*.o" ! -name "detection.o" | wc -l)
          echo ">> ags engine 本體 .o 數 = $AGS_OBJ (0=只有 detection,libmad 沒生效)"
          [ "$AGS_OBJ" -gt 0 ] || { echo "### AGS engine 未編入 — 中止 ###"; exit 14; }
          # make -j 的 'all' target 已跑 Gradle;androiddistdebug 確保 APK 複製到 debug/
          make androiddistdebug
          echo ">> APK 內含 .so:"
          unzip -l ScummVM-debug.apk | grep '\.so' || true
          ls -la *.apk debug/*.apk 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-android-x86
          path: scummvm-src/**/*.apk

  # ---- Windows .exe + 相依 DLL(patched ScummVM,僅 ags engine,MSYS2 MinGW)----
  windows:
    runs-on: windows-latest
    defaults:
      run: { shell: 'msys2 {0}' }
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git make nasm
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2 mingw-w64-x86_64-SDL2_net
            mingw-w64-x86_64-freetype mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libvorbis mingw-w64-x86_64-flac mingw-w64-x86_64-libmad
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: configure + build
        working-directory: scummvm-src
        run: |
          ./configure --disable-all-engines --enable-engine=ags --enable-release
          make -j$(nproc)
      - name: 收集 scummvm.exe + 相依 DLL
        run: |
          mkdir -p dist-win
          cp scummvm-src/scummvm.exe dist-win/
          # 用 ntldd 找出所有 MinGW 相依 DLL 一併打包(玩家免裝 runtime)
          pacman -S --noconfirm mingw-w64-x86_64-ntldd-git || true
          for dll in $(ntldd -R dist-win/scummvm.exe | grep mingw64 | awk '{print $3}'); do cp "$dll" dist-win/ 2>/dev/null || true; done
          ls -la dist-win/
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-windows
          path: dist-win/

  # ---- 用 Android 模擬器驗證 on-screen D-pad 移游標(不涉版權)----
  # 計畫見 docs/ci-android-dpad-test-plan.md;機制見 docs/android-dpad-virtual-mouse.md。
  # 用本專案自己的 x86_64 debug APK(android-x86 job 產出)→ ABI 對上 x86_64 模擬器且可 run-as 寫 config。
  # 測試遊戲:《5 Days a Stranger》(免費 AGS freeware),完全不碰 QFG2 版權資料。
  android-dpad-test:
    needs: android-x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下載本專案 x86_64 debug APK(android-x86 job 產出)
        uses: actions/download-artifact@v4
        with:
          name: qfg2-cht-android-x86
          path: /home/runner/work/_temp/apk
      - name: 找 APK 路徑 + 設定環境變數
        run: |
          APK=$(find /home/runner/work/_temp/apk -name '*.apk' | head -1)
          echo "APK=$APK" >> "$GITHUB_ENV"
          echo ">> APK: $APK"
          ls -la "$APK"
      - name: 下載《5 Days a Stranger》(免費 AGS freeware,不涉 QFG2 版權)
        run: |
          # gameid=5daysastranger,ScummVM AGS detection 認的主檔是 5days.exe
          wget -q "https://archive.org/download/5_Days_a_Stranger/5days.zip" -O /tmp/5days.zip \
            && echo ">> 下載完成 ($(wc -c </tmp/5days.zip) bytes)" \
            || echo "!! 下載失敗"
          mkdir -p /home/runner/work/_temp/5days
          unzip -q /tmp/5days.zip -d /home/runner/work/_temp/5days 2>/dev/null || true
          # 有些 zip 多一層子目錄,找出真正含 5days.exe 的目錄
          GAME_ROOT=$(find /home/runner/work/_temp/5days -maxdepth 3 -name '5days.exe' -type f \
            | head -1 | xargs dirname 2>/dev/null)
          GAME_ROOT="${GAME_ROOT:-/home/runner/work/_temp/5days}"
          echo "GAME_DIR=$GAME_ROOT" >> "$GITHUB_ENV"
          echo ">> 遊戲目錄: $GAME_ROOT"
          ls -la "$GAME_ROOT/" | head -20
      - name: 開 KVM(模擬器硬體加速)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: 模擬器跑 D-pad probe
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: bash tools/android_dpad_probe.sh
      - name: 收集截圖 + logcat(人工確認游標有沒有被推動)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dpad-test-shots
          path: |
            shot_*.png
            logcat*.txt
