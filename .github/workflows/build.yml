name: build

# 英雄傳奇II 繁中化:打包翻譯資產 + 跨平台 ScummVM(AGS + CJK patch)。
# 注意:macOS / Android job 依 ScummVM 官方 build 流程撰寫,首次執行可能需依
# runner 環境微調(NDK 版本、brew 套件名)。translate-assets job 為平台無關、
# 一定可產出的核心交付物。

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  # ---- 平台無關的繁中化資產(核心交付物)----
  translate-assets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: 安裝 CJK 字型(host 來源)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: 產生 chinese.tra + cjkfont16.bin
        run: |
          uv venv && uv pip install pillow
          uv run tools/make_tra.py tools/translation.tsv --out dist/chinese.tra --charset-out build/charset.txt
          uv run tools/build_cjk_font.py --size 16 --charset-file build/charset.txt --bin dist/cjkfont16.bin --out build/cjk16
          uv run tools/build_cjk_font.py --size 24 --charset-file build/charset.txt --bin dist/cjkfont24.bin --out build/cjk24
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-assets
          path: |
            dist/chinese.tra
            dist/cjkfont16.bin
            dist/cjkfont24.bin
            README.md

  # ---- macOS universal .app/.dmg(patched ScummVM,僅 ags engine)----
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: 安裝相依(只裝 AGS 必要;多裝的 codec 會讓 configure 強制靜態連結而缺 .a)
        run: brew install sdl2 sdl2_net freetype libpng libvorbis libogg flac bzip2 zlib dylibbundler
      - name: 把 keg-only 的 bzip2/zlib 靜態檔 symlink 到 configure 硬編的路徑
        run: |
          # ScummVM configure 在 link 行硬編 /opt/homebrew/lib/libbz2.a 與 libz.a,
          # 但 brew bzip2/zlib 是 keg-only,.a 在 /opt/homebrew/opt/*/lib。建 symlink。
          ln -sf /opt/homebrew/opt/bzip2/lib/libbz2.a /opt/homebrew/lib/libbz2.a
          ln -sf /opt/homebrew/opt/zlib/lib/libz.a    /opt/homebrew/lib/libz.a
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: configure + build + bundle
        working-directory: scummvm-src
        run: |
          ./configure --disable-all-engines --enable-engine=ags --enable-release \
            --disable-mad --disable-faad --disable-a52 --disable-fluidsynth \
            --disable-libcurl --disable-sndio --disable-tts
          make -j$(sysctl -n hw.ncpu)
          make bundle
      - name: 把相依 dylib 打包進 .app(否則乾淨 Mac 缺 brew 庫會 dyld 閃退)
        working-directory: scummvm-src
        run: |
          APP=$(ls -d ScummVM.app */ScummVM.app 2>/dev/null | head -1)
          echo "bundling dylibs into $APP"
          # dylibbundler 遞迴把非系統 dylib(brew 的 SDL2/freetype…)拷進 .app/Contents/libs 並改 install_name
          dylibbundler -od -b -cd \
            -x "$APP/Contents/MacOS/scummvm" \
            -d "$APP/Contents/libs" \
            -p "@executable_path/../libs/"
          echo "=== 確認主執行檔已無外部 /opt/homebrew 依賴 ==="
          otool -L "$APP/Contents/MacOS/scummvm" | grep -E "homebrew|/usr/local" && echo "!! 仍有外部依賴" || echo "OK:只剩系統庫與 @executable_path"
      - name: 打包 DMG
        run: |
          mkdir -p dmgroot && cp -R scummvm-src/ScummVM.app dmgroot/ 2>/dev/null || cp -R scummvm-src/*.app dmgroot/
          hdiutil create -volname "QFG2-CHT-ScummVM" -srcfolder dmgroot -ov -format UDZO qfg2-cht-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-macos
          path: qfg2-cht-macos.dmg

  # ---- Android APK(patched ScummVM,僅 ags engine)----
  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: 安裝相依
        run: sudo apt-get update && sudo apt-get install -y build-essential nasm
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: 安裝 Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with: { ndk-version: r26d }
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: 從源碼建 Oboe(ScummVM Android 音訊庫)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          git clone --depth 1 https://github.com/google/oboe.git "$GITHUB_WORKSPACE/oboe"
          # [HARD] BUILD_SHARED_LIBS=ON:ScummVM 用 -Wl,-Bdynamic -loboe 動態連結,
          # 需 liboboe.so;預設 cmake 產 liboboe.a(靜態)會 undefined symbol。
          cmake -S "$GITHUB_WORKSPACE/oboe" -B "$GITHUB_WORKSPACE/oboe-build" \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
          cmake --build "$GITHUB_WORKSPACE/oboe-build" -j$(nproc)
          # 放進 NDK sysroot lib:NDK 連結 API21 會找 aarch64-linux-android/(通用)與 /21/ 兩處,都放。
          SYSLIB="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android"
          LOBOE=$(find "$GITHUB_WORKSPACE/oboe-build" -name 'liboboe.so' | head -1)
          echo ">> liboboe.so 位置: $LOBOE"
          cp "$LOBOE" "$SYSLIB/"
          cp "$LOBOE" "$SYSLIB/21/" 2>/dev/null || true
          ls -la "$SYSLIB/liboboe.so" "$SYSLIB/21/liboboe.so" 2>/dev/null || true
      - name: configure + build APK (arm64)
        working-directory: scummvm-src
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          # ScummVM Android toolchain build(僅 ags engine)。
          # [HARD] ANDROID_NDK_ROOT 必須指向我們 setup 的 NDK:configure(2208 行)用
          # $ANDROID_NDK_ROOT/source.properties 抓 NDK 版本,沒設會抓到 runner 預裝的
          # 別版(27.3)→ 與 build.gradle ndkVersion 不符 → make androiddist exit 1。
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          # 把 dists/android/build.gradle 的 ndkVersion 改成實際 NDK 版本,讓 configure 比對通過
          NDKVER=$(sed -n 's/^Pkg.Revision *= *//p' "$ANDROID_NDK_ROOT/source.properties")
          echo ">> NDK 版本: $NDKVER"
          sed -i "s/ndkVersion *= *\"[^\"]*\"/ndkVersion = \"$NDKVER\"/" dists/android/build.gradle
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          export CPPFLAGS="-I$GITHUB_WORKSPACE/oboe/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/oboe-build"
          # [HARD] --host 必須是 android-arm64-v8a(ScummVM configure 認的 pattern);
          # 用 android-aarch64 不 match 任何 case → 不進 Android 分支 → 不套 -loboe -llog → undefined
          ./configure --host=android-arm64-v8a --enable-engine=ags --disable-all-engines --enable-release
          make -j$(nproc)
          # [HARD] androidtest 會跑 installDebug(裝到裝置),CI 無裝置/模擬器會 fail。
          # androiddistdebug = all(gradlew assembleDebug 純 build APK)+ cp 到 debug/,不安裝。
          make androiddistdebug
          ls -la *.apk debug/*.apk 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-android
          path: scummvm-src/**/*.apk

  # ---- Windows .exe + 相依 DLL(patched ScummVM,僅 ags engine,MSYS2 MinGW)----
  windows:
    runs-on: windows-latest
    defaults:
      run: { shell: 'msys2 {0}' }
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git make nasm
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2 mingw-w64-x86_64-SDL2_net
            mingw-w64-x86_64-freetype mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libvorbis mingw-w64-x86_64-flac mingw-w64-x86_64-libmad
      - name: 取得並 patch ScummVM
        run: bash tools/apply_patches.sh "$GITHUB_WORKSPACE/scummvm-src"
      - name: configure + build
        working-directory: scummvm-src
        run: |
          ./configure --disable-all-engines --enable-engine=ags --enable-release
          make -j$(nproc)
      - name: 收集 scummvm.exe + 相依 DLL
        run: |
          mkdir -p dist-win
          cp scummvm-src/scummvm.exe dist-win/
          # 用 ntldd 找出所有 MinGW 相依 DLL 一併打包(玩家免裝 runtime)
          pacman -S --noconfirm mingw-w64-x86_64-ntldd-git || true
          for dll in $(ntldd -R dist-win/scummvm.exe | grep mingw64 | awk '{print $3}'); do cp "$dll" dist-win/ 2>/dev/null || true; done
          ls -la dist-win/
      - uses: actions/upload-artifact@v4
        with:
          name: qfg2-cht-windows
          path: dist-win/

  # ---- 用 Android 模擬器驗證 on-screen D-pad 移游標(免費 AGS 遊戲,不涉版權)----
  # 計畫見 docs/ci-android-dpad-test-plan.md;機制見 docs/android-dpad-virtual-mouse.md。
  # 用純引擎 APK + 免費的《5 Days a Stranger》(AGS, freeware)當素材,絕不碰 QFG2 版權資料。
  android-dpad-test:
    needs: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下載 CI 純引擎 APK(android job 產出)
        uses: actions/download-artifact@v4
        with:
          name: qfg2-cht-android
          path: apk-in
      - name: 準備 base APK
        run: cp "$(find apk-in -name '*.apk' | head -1)" base.apk && ls -la base.apk
      - name: 取免費 AGS 測試遊戲(5 Days a Stranger, freeware)
        run: |
          wget -q https://archive.org/download/5_Days_a_Stranger/5days.zip
          mkdir -p game5days && unzip -q 5days.zip -d game5days
          MAIN=$(find game5days \( -iname '*.exe' -o -iname 'ac2game.*' \) | head -1)
          echo "GAME_DIR=$(dirname "$MAIN")" >> "$GITHUB_ENV"
          echo "APK=base.apk" >> "$GITHUB_ENV"
          echo ">> 遊戲根:$(dirname "$MAIN")"; find game5days | head -20
      - name: 開 KVM(模擬器硬體加速)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: 模擬器跑 D-pad probe
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: bash tools/android_dpad_probe.sh
      - name: 收集 D-pad 截圖(人工確認游標有沒有被推動)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dpad-test-shots
          path: 'shot_*.png'
